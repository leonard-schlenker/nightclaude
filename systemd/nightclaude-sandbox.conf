# Sandbox drop-in for the remote worker, installed by deploy-worker.sh as
# ~/.config/systemd/user/nightclaude.service.d/sandbox.conf.
#
# Confines night runs to their assigned work area: the whole filesystem is
# read-only for the runner and every claude it starts - regardless of the
# task's permission mode - except the paths opened up below.
#
# Not installed for single-machine workers (install.sh): there task workdirs
# are arbitrary local directories, so a fixed allowlist would break them.
# To sandbox one anyway, copy this file to
# ~/.config/systemd/user/nightclaude.service.d/sandbox.conf and add a
# ReadWritePaths= line per directory you queue tasks in.

[Service]
ProtectSystem=strict
ProtectHome=read-only
PrivateTmp=yes
NoNewPrivileges=yes

# The mirrored task workdirs ([remote] work_root; adjust if you changed it).
ReadWritePaths=%h/nightclaude-work
# nightclaude's own task files, logs and runner lock.
ReadWritePaths=%h/.local/share/nightclaude
# claude's session state and config ("-": skip if missing).
ReadWritePaths=-%h/.claude
ReadWritePaths=-%h/.claude.json

# Self-update would fail noisily on the read-only filesystem; updates come
# with deploy-worker.sh instead.
Environment=DISABLE_AUTOUPDATER=1
